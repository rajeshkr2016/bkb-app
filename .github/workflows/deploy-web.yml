name: Deploy Web to GitHub Pages

on:
  push:
    branches: [master, supabase-cloud]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Web App
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Create .env for Expo build
        working-directory: app
        run: |
          printf 'EXPO_PUBLIC_SUPABASE_URL=https://ywleqlcyxtalbxejniov.supabase.co\n' > .env.local
          printf 'EXPO_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$ANON_KEY" >> .env.local
          echo "Env file lines: $(wc -l < .env.local)"
          echo "Key length: $(echo -n "$ANON_KEY" | wc -c)"
        env:
          ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Export static web build
        working-directory: app
        run: npx expo export --platform web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: self-hosted
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
