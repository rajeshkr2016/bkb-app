# Metro bundler nginx variables

metro_domain: example.local
metro_web_domain: "{{ metro_domain }}"
metro_mobile_domain: "{{ metro_domain }}"

metro_upstream: 127.0.0.1:8081
metro_web_upstream: "{{ metro_upstream }}"
metro_mobile_upstream: "{{ metro_upstream }}"

metro_web_upstream_scheme: http
metro_mobile_upstream_scheme: http

metro_ssl_cert_path: "/etc/letsencrypt/live/{{ metro_domain }}/fullchain.pem"
metro_ssl_key_path: "/etc/letsencrypt/live/{{ metro_domain }}/privkey.pem"

# Optional overrides
metro_certbot_enabled: true
metro_certbot_email: rajeshkr.mail2025@gmail.com
