---
- name: Configure nginx for Metro bundlers
  hosts: metro_bundlers
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks:
    - name: Check whether repo .env.local exists on the control machine
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../.env.local"
        checksum_algorithm: sha256
      delegate_to: localhost
      become: false
      register: repo_env_local_stat

    - name: Read Metro env overrides from repo .env.local on the control machine
      ansible.builtin.shell: |
        if [ -f "{{ playbook_dir }}/../../.env.local" ]; then
          set -a
          . "{{ playbook_dir }}/../../.env.local"
          printf 'METRO_DOMAIN=%s\n' "${METRO_DOMAIN:-}"
          printf 'METRO_UPSTREAM=%s\n' "${METRO_UPSTREAM:-}"
        fi
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      register: metro_env_overrides
      changed_when: false

    - name: Parse Metro env overrides
      ansible.builtin.set_fact:
        metro_env_override_map: "{{ dict(metro_env_overrides.stdout_lines | map('split', '=', 1) | list) }}"
      when: metro_env_overrides.stdout | trim != ""

    - name: Override domain variables from repo .env.local when provided
      ansible.builtin.set_fact:
        metro_domain: "{{ metro_env_override_map.METRO_DOMAIN }}"
      when:
        - metro_env_override_map is defined
        - (metro_env_override_map.METRO_DOMAIN | default('') | trim) != ""

    - name: Override upstream variables from repo .env.local when provided
      ansible.builtin.set_fact:
        metro_upstream: "{{ metro_env_override_map.METRO_UPSTREAM }}"
      when:
        - metro_env_override_map is defined
        - (metro_env_override_map.METRO_UPSTREAM | default('') | trim) != ""

  vars:
    metro_config_name: metro-bundler.conf
    metro_config_path: /etc/nginx/sites-available/{{ metro_config_name }}
    metro_config_link: /etc/nginx/sites-enabled/{{ metro_config_name }}
    project_root: "{{ playbook_dir }}/../.."
    remote_project_dir: /opt/projects/bkb-app

  tasks:
    - name: Ensure remote project directory exists
      ansible.builtin.file:
        path: "{{ remote_project_dir }}"
        state: directory
        mode: "0755"

    - name: Copy repo .env.local to remote project directory when present
      ansible.builtin.copy:
        src: "{{ project_root }}/.env.local"
        dest: "{{ remote_project_dir }}/.env.local"
        mode: "0600"
      when: repo_env_local_stat.stat.exists

    - name: Check remote .env.local checksum after copy
      ansible.builtin.stat:
        path: "{{ remote_project_dir }}/.env.local"
        checksum_algorithm: sha256
      register: remote_env_local_stat
      when: repo_env_local_stat.stat.exists

    - name: Verify remote .env.local matches local file
      ansible.builtin.assert:
        that:
          - remote_env_local_stat.stat.exists
          - remote_env_local_stat.stat.checksum == repo_env_local_stat.stat.checksum
        fail_msg: >-
          Remote .env.local checksum does not match local file.
          local={{ repo_env_local_stat.stat.checksum | default('missing') }}
          remote={{ remote_env_local_stat.stat.checksum | default('missing') }}
        success_msg: >-
          Verified /opt/projects/bkb-app/.env.local checksum matches local file:
          {{ remote_env_local_stat.stat.checksum }}
      when: repo_env_local_stat.stat.exists

    - name: Ensure nginx is installed
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true

    - name: Ensure Metro cache directory exists
      ansible.builtin.file:
        path: "{{ metro_cache_path | default('/var/cache/nginx/metro') }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Install Metro nginx config
      ansible.builtin.template:
        src: nginx-metro-bundler.conf.j2
        dest: "{{ metro_config_path }}"
        mode: "0644"
      notify: Reload nginx

    - name: Enable Metro nginx config
      ansible.builtin.file:
        src: "{{ metro_config_path }}"
        dest: "{{ metro_config_link }}"
        state: link
      notify: Reload nginx

    - name: Disable default nginx site if present
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Test nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
