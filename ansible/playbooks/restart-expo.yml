---
- name: Restart Expo dev server
  hosts: metro_bundlers
  become: false
  vars:
    remote_project_dir: /opt/projects/bkb-app
    expo_mode: --lan
    expo_log_file: /tmp/bkb-expo.log
    expo_run_user: "{{ ansible_user }}"

  tasks:
    - name: Ensure remote Expo startup script exists
      ansible.builtin.stat:
        path: "{{ remote_project_dir }}/scripts/ubuntu/04-start-expo.sh"
      register: expo_start_script

    - name: Fail if Expo startup script is missing
      ansible.builtin.assert:
        that:
          - expo_start_script.stat.exists
        fail_msg: >-
          Missing {{ remote_project_dir }}/scripts/ubuntu/04-start-expo.sh on the remote host.

    - name: Check current git branch on remote repo
      ansible.builtin.command: git rev-parse --abbrev-ref HEAD
      args:
        chdir: "{{ remote_project_dir }}"
      register: remote_git_branch
      changed_when: false

    - name: Pull latest code on remote repo as SSH user
      ansible.builtin.command: git pull --ff-only origin {{ remote_git_branch.stdout }}
      args:
        chdir: "{{ remote_project_dir }}"
      register: remote_git_pull
      changed_when: "'Already up to date.' not in remote_git_pull.stdout"

    - name: Inspect current listener on port 8081
      ansible.builtin.shell: |
        lsof -nP -iTCP:8081 -sTCP:LISTEN || true
      args:
        executable: /bin/bash
      become: true
      register: expo_port_8081_before
      changed_when: false

    - name: Stop any existing Expo process on port 8081
      ansible.builtin.shell: |
        if lsof -ti:8081 >/dev/null 2>&1; then
          lsof -ti:8081 | while read -r pid; do
            kill -9 "$pid" 2>/dev/null || true
          done
        fi
      args:
        executable: /bin/bash
      become: true
      changed_when: true

    - name: Wait for port 8081 to be free
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8081
        timeout: 30
        delay: 1
        state: stopped

    - name: Start Expo in the background
      ansible.builtin.shell: >-
        nohup bash {{ remote_project_dir }}/scripts/ubuntu/04-start-expo.sh {{ expo_mode }}
        > {{ expo_log_file }} 2>&1 < /dev/null &
      args:
        chdir: "{{ remote_project_dir }}"
        executable: /bin/bash
      become: false
      changed_when: true

    - name: Wait for Expo to start listening on port 8081
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8081
        timeout: 120
        delay: 2
        state: started

    - name: Show Expo log tail
      ansible.builtin.command: tail -n 40 {{ expo_log_file }}
      register: expo_log_tail
      changed_when: false

    - name: Fail if Expo skipped startup
      ansible.builtin.assert:
        that:
          - "'Skipping dev server' not in expo_log_tail.stdout"
          - "'Use port 8082 instead?' not in expo_log_tail.stdout"
        fail_msg: >-
          Expo did not start on port 8081. Check {{ expo_log_file }} on the remote host.

    - name: Report Expo restart result
      ansible.builtin.debug:
        msg:
          - "Git pull result: {{ remote_git_pull.stdout | default('') | trim }}"
          - "Previous 8081 listener: {{ expo_port_8081_before.stdout | default('none') | trim }}"
          - "Expo started as user {{ expo_run_user }}"
          - "Expo restarted on {{ inventory_hostname }} in mode {{ expo_mode }}"
          - "Log file: {{ expo_log_file }}"
          - "{{ expo_log_tail.stdout }}"
